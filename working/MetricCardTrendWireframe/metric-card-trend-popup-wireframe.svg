<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430" role="img" aria-labelledby="title desc">
  <title id="title">Metric card trend popup wireframe</title>
  <desc id="desc">Wireframe showing the existing metric card with a faint material-style trend icon and an opened small trend popup.</desc>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#16213e" flood-opacity="0.08"/>
    </filter>
    <marker id="dot" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2.4" fill="#2f80ed"/>
    </marker>
  </defs>

  <rect width="760" height="430" fill="#f5f7fb"/>

  <text x="40" y="42" fill="#16213e" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Metric Card Trend Pop-Up Wireframe</text>
  <text x="40" y="67" fill="#5e6b7a" font-family="Inter, Arial, sans-serif" font-size="13">Concept only: add a faint trend icon to the standard metric card header; icon opens a compact recent-history pop-up.</text>

  <!-- Existing-style metric card -->
  <g transform="translate(58 118)" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="190" rx="4" fill="#ffffff" stroke="#d9e2ef"/>

    <text x="22" y="37" fill="#5e6b7a" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="0.8">PDU REAL POWER</text>

    <!-- Faint material-style insert chart icon -->
    <g transform="translate(270 20)" opacity="0.38">
      <rect x="0" y="0" width="28" height="28" rx="4" fill="none" stroke="#6f7d8c" stroke-width="1.5"/>
      <path d="M6 21H23" fill="none" stroke="#6f7d8c" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M7 18L12 13L16 16L22 8" fill="none" stroke="#2f80ed" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="22" y="91" fill="#16213e" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">124 kW</text>

    <rect x="22" y="113" width="276" height="10" rx="5" fill="#d9e2ef"/>
    <rect x="22" y="113" width="154" height="10" rx="5" fill="#2f80ed"/>

    <text x="22" y="157" fill="#5e6b7a" font-family="Inter, Arial, sans-serif" font-size="14">Rolling sum from downstream branch meters</text>
  </g>

  <!-- Callout line -->
  <path d="M356 137C396 114 425 111 464 123" fill="none" stroke="#a7b2c0" stroke-width="1.5" stroke-dasharray="5 5"/>

  <!-- Open popup -->
  <g transform="translate(420 92)" filter="url(#shadow)">
    <rect x="0" y="0" width="280" height="210" rx="4" fill="#ffffff" stroke="#d9e2ef"/>
    <path d="M21 43L8 56L21 69" fill="#ffffff" stroke="#d9e2ef"/>

    <text x="24" y="34" fill="#16213e" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">PDU Real Power</text>
    <text x="24" y="55" fill="#5e6b7a" font-family="Inter, Arial, sans-serif" font-size="12">Last 30 minutes</text>
    <text x="214" y="35" fill="#16213e" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="900">124 kW</text>

    <!-- Chart frame -->
    <line x1="36" y1="164" x2="252" y2="164" stroke="#d9e2ef"/>
    <line x1="36" y1="84" x2="36" y2="164" stroke="#d9e2ef"/>
    <line x1="36" y1="124" x2="252" y2="124" stroke="#edf2f7" stroke-dasharray="4 4"/>
    <line x1="36" y1="104" x2="252" y2="104" stroke="#edf2f7" stroke-dasharray="4 4"/>

    <!-- Trend -->
    <path d="M36 144
             C56 140 66 132 84 134
             C103 137 112 149 132 145
             C151 141 159 119 178 116
             C198 112 211 129 229 124
             C240 121 246 112 252 106"
          fill="none" stroke="#2f80ed" stroke-width="3" stroke-linecap="round" marker-end="url(#dot)"/>

    <!-- Small summary row -->
    <g font-family="Inter, Arial, sans-serif" font-size="11">
      <text x="36" y="188" fill="#5e6b7a">Min 118</text>
      <text x="111" y="188" fill="#5e6b7a">Avg 122</text>
      <text x="188" y="188" fill="#5e6b7a">Max 126</text>
    </g>
  </g>

  <!-- Bottom notes -->
  <g transform="translate(58 354)" font-family="Inter, Arial, sans-serif">
    <text x="0" y="0" fill="#16213e" font-size="13" font-weight="800">Interaction notes</text>
    <text x="0" y="24" fill="#5e6b7a" font-size="12">Icon should be low-emphasis until hover. On click, open a small popup anchored near the card.</text>
    <text x="0" y="44" fill="#5e6b7a" font-size="12">Popup can query the same tag path as the card value and show recent history with min/avg/max.</text>
  </g>
</svg>
